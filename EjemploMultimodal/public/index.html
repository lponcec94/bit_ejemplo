<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor de Impacto Social Multimodal - Gemini AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .multimodal-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .main-content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        textarea, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: block;
            padding: 20px;
            border: 2px dashed #4f46e5;
            border-radius: 8px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-label:hover {
            background: #e8ebff;
            border-color: #7c3aed;
        }

        .file-upload-label.has-file {
            background: #e8f5e8;
            border-color: #10b981;
            border-style: solid;
        }

        .upload-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .image-preview {
            margin-top: 15px;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .file-info {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .remove-file {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .response {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #4f46e5;
            display: none;
        }

        .response.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .response-section {
            margin-bottom: 20px;
        }

        .response-section h4 {
            color: #4f46e5;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .response-section p, .response-section li {
            color: #666;
            line-height: 1.6;
        }

        .response-section ul {
            margin-left: 20px;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }

        .error {
            background: #fee;
            border-left-color: #e53e3e;
            color: #c53030;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e1e5e9;
        }

        .feature-icon {
            font-size: 1.5em;
            margin-bottom: 8px;
        }

        .feature-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .feature-desc {
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤝 Asesor de Impacto Social</h1>
            <p>Obtén consejos personalizados con soporte para imágenes</p>
            <div class="multimodal-badge">🖼️ Multimodal - Texto + Imágenes</div>
        </div>

        <div class="main-content">
            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">💬</div>
                    <div class="feature-title">Texto</div>
                    <div class="feature-desc">Describe tu proyecto</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🖼️</div>
                    <div class="feature-title">Imágenes</div>
                    <div class="feature-desc">Sube fotos del contexto</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🤖</div>
                    <div class="feature-title">IA Avanzada</div>
                    <div class="feature-desc">Análisis multimodal</div>
                </div>
            </div>

            <form id="consultaForm">
                <div class="form-group">
                    <label for="contextoSocial">Contexto de tu proyecto:</label>
                    <textarea 
                        id="contextoSocial" 
                        name="contextoSocial" 
                        placeholder="Describe tu proyecto social, la comunidad que atiendes, los recursos disponibles, etc."
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="imagen">Imagen de contexto (opcional):</label>
                    <div class="file-upload">
                        <input type="file" id="imagen" name="imagen" accept="image/*">
                        <label for="imagen" class="file-upload-label" id="fileLabel">
                            <div class="upload-icon">📷</div>
                            <div>Click para subir una imagen o arrastra aquí</div>
                            <div class="file-info">Formatos: JPEG, PNG, GIF, BMP, WEBP (Máx: 10MB)</div>
                        </label>
                    </div>
                    <div class="image-preview" id="imagePreview"></div>
                </div>

                <div class="form-group">
                    <label for="prompt">Tu pregunta o consulta:</label>
                    <textarea 
                        id="prompt" 
                        name="prompt" 
                        placeholder="¿Qué necesitas saber? Ej: ¿Cómo puedo mejorar mi estrategia de fundraising? ¿Qué métricas debo medir? ¿Qué opinas de la imagen que subí?"
                        required
                    ></textarea>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    🚀 Obtener Asesoramiento Multimodal
                </button>
            </form>

            <div id="response" class="response">
                <h3>📋 Recomendaciones Personalizadas</h3>
                <div id="responseContent"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('consultaForm');
        const submitBtn = document.getElementById('submitBtn');
        const responseDiv = document.getElementById('response');
        const responseContent = document.getElementById('responseContent');
        const fileInput = document.getElementById('imagen');
        const fileLabel = document.getElementById('fileLabel');
        const imagePreview = document.getElementById('imagePreview');

        // Manejo de archivo de imagen
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 10 * 1024 * 1024) {
                    alert('El archivo es demasiado grande. Máximo 10MB.');
                    e.target.value = '';
                    return;
                }

                fileLabel.classList.add('has-file');
                fileLabel.innerHTML = `
                    <div class="upload-icon">✅</div>
                    <div>Archivo seleccionado: ${file.name}</div>
                    <div class="file-info">Tamaño: ${(file.size / 1024 / 1024).toFixed(2)}MB</div>
                `;

                // Mostrar vista previa
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.innerHTML = `
                        <img src="${e.target.result}" alt="Vista previa">
                        <br>
                        <button type="button" class="remove-file" onclick="removeImage()">Eliminar imagen</button>
                    `;
                };
                reader.readAsDataURL(file);
            }
        });

        function removeImage() {
            fileInput.value = '';
            fileLabel.classList.remove('has-file');
            fileLabel.innerHTML = `
                <div class="upload-icon">📷</div>
                <div>Click para subir una imagen o arrastra aquí</div>
                <div class="file-info">Formatos: JPEG, PNG, GIF, BMP, WEBP (Máx: 10MB)</div>
            `;
            imagePreview.innerHTML = '';
        }

        // Manejo del formulario
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const contextoSocial = document.getElementById('contextoSocial').value;
            const prompt = document.getElementById('prompt').value;
            const imagen = fileInput.files[0];

            // Mostrar estado de carga
            submitBtn.disabled = true;
            submitBtn.textContent = imagen ? '🔄 Procesando imagen y texto...' : '🔄 Procesando consulta...';
            responseDiv.classList.remove('show', 'error');

            try {
                const formData = new FormData();
                formData.append('prompt', prompt);
                formData.append('contextoSocial', contextoSocial);
                if (imagen) {
                    formData.append('imagen', imagen);
                }

                const response = await fetch('/api/consultar', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Error en la respuesta del servidor');
                }

                const data = await response.json();
                displayResponse(data);

            } catch (error) {
                console.error('Error:', error);
                showError('Hubo un error al procesar tu solicitud. Por favor, intenta nuevamente.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Obtener Asesoramiento Multimodal';
            }
        });

        function displayResponse(data) {
            let html = `
                <div class="response-section">
                    <h4>💡 Respuesta:</h4>
                    <p>${data.respuesta}</p>
                </div>
            `;
            
            if (data.analisis_imagen) {
                html += `
                    <div class="response-section">
                        <h4>🖼️ Análisis de imagen:</h4>
                        <p>${data.analisis_imagen}</p>
                    </div>
                `;
            }
            
            if (data.pasos_a_seguir && data.pasos_a_seguir.length > 0) {
                html += `
                    <div class="response-section">
                        <h4>📝 Pasos a seguir:</h4>
                        <ul>
                            ${data.pasos_a_seguir.map(paso => `<li>${paso}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (data.recursos_sugeridos && data.recursos_sugeridos.length > 0) {
                html += `
                    <div class="response-section">
                        <h4>🔗 Recursos sugeridos:</h4>
                        <ul>
                            ${data.recursos_sugeridos.map(recurso => `<li>${recurso}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            responseContent.innerHTML = html;
            responseDiv.classList.add('show');
        }

        function showError(message) {
            responseContent.innerHTML = `<p><strong>Error:</strong> ${message}</p>`;
            responseDiv.classList.add('show', 'error');
        }

        // Drag and drop
        const dropZone = fileLabel;

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.background = '#e8ebff';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.background = '#f8f9ff';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = '#f8f9ff';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
